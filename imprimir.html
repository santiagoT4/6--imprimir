<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cotilpez - Impresión con RawBT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #e8ecf1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .paper {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            background: #0f766e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 20px;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .content {
            padding: 20px;
        }
        
        .info-card {
            background: #f0fdf4;
            border-left: 4px solid #0f766e;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        
        .info-card p {
            margin: 4px 0;
        }
        
        .ticket-preview {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 350px;
            overflow: auto;
        }
        
        .ticket-preview::-webkit-scrollbar {
            width: 6px;
        }
        
        .ticket-preview::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .ticket-preview::-webkit-scrollbar-thumb {
            background: #0f766e;
            border-radius: 10px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        .btn-primary {
            background: #0f766e;
            color: white;
            box-shadow: 0 2px 8px rgba(15,118,110,0.3);
        }
        
        .btn-primary:hover {
            background: #0d5c56;
        }
        
        .btn-secondary {
            background: #64748b;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #475569;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .flex-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .flex-buttons button {
            flex: 1;
            margin-bottom: 0;
        }
        
        .status {
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
        }
        
        .status-info {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .status-success {
            background: #dcfce7;
            color: #166534;
        }
        
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status-warning {
            background: #fed7aa;
            color: #9a3412;
        }
        
        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }
        
        .footer {
            text-align: center;
            font-size: 10px;
            color: #94a3b8;
            padding: 16px 20px;
            background: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="paper">
        <div class="header">
            <h1>🐟 COTILPEZ S.A.S.</h1>
            <p>Impresión con RawBT - DPP-350</p>
        </div>
        
        <div class="content">
            <div id="infoVenta" class="info-card">
                <p>📄 Cargando información...</p>
            </div>
            
            <div id="ticketPreview" class="ticket-preview">
                ⏳ Generando ticket...
            </div>
            
            <button id="btnImprimir" class="btn-primary">🖨️ IMPRIMIR TICKET</button>
            
            <div class="flex-buttons">
                <button id="btnCopiar" class="btn-secondary">📋 COPIAR</button>
                <button id="btnCerrar" class="btn-danger">❌ CERRAR</button>
            </div>
            
            <div id="status" class="status status-info">
                ⚪ Listo para imprimir
            </div>
        </div>
        
        <div class="footer">
            Conecta tu impresora DPP-350 en RawBT | PIN: 0000
        </div>
    </div>

    <script>
        // ============================================================
        // VARIABLES GLOBALES
        // ============================================================
        let ticketTexto = '';      // Ticket en texto plano (legible)
        let datosVenta = null;     // Datos de la venta
        let totalNumerico = 0;     // Total en número
        
        // ============================================================
        // LEER DATOS DE LA URL (lo que envía Apps Script)
        // ============================================================
        function leerDatosURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const productosRaw = urlParams.get('productos');
            
            datosVenta = {
                factura: urlParams.get('factura') || 'S/N',
                cliente: urlParams.get('cliente') || 'Consumidor Final',
                total: urlParams.get('total') || '0',
                fecha: urlParams.get('fecha') || new Date().toLocaleString(),
                comentario: urlParams.get('comentario') || '',  // ← CAMPO COMENTARIO
                productos: []
            };
            
            totalNumerico = parseFloat(datosVenta.total) || 0;
            
            if (productosRaw) {
                try {
                    datosVenta.productos = JSON.parse(productosRaw);
                } catch(e) {
                    console.error('Error parseando productos:', e);
                    datosVenta.productos = [];
                }
            }
            
            // Mostrar información de la venta
            mostrarInfoVenta();
            
            // Generar el ticket
            ticketTexto = generarTicketTexto();
            
            // Mostrar preview
            document.getElementById('ticketPreview').innerText = ticketTexto;
            
            return datosVenta.factura !== 'S/N';
        }
        
        // ============================================================
        // MOSTRAR INFORMACIÓN DE LA VENTA
        // ============================================================
        function mostrarInfoVenta() {
            const container = document.getElementById('infoVenta');
            let comentarioHtml = '';
            if (datosVenta.comentario && datosVenta.comentario.trim() !== '') {
                comentarioHtml = `<p><strong>💬 COMENTARIO:</strong> ${escapeHtml(datosVenta.comentario)}</p>`;
            }
            
            container.innerHTML = `
                <p><strong>📄 FACTURA #:</strong> ${datosVenta.factura}</p>
                <p><strong>👤 CLIENTE:</strong> ${escapeHtml(datosVenta.cliente)}</p>
                <p><strong>💰 TOTAL:</strong> $${totalNumerico.toLocaleString()}</p>
                <p><strong>📅 FECHA:</strong> ${datosVenta.fecha}</p>
                <p><strong>📦 PRODUCTOS:</strong> ${datosVenta.productos.length}</p>
                ${comentarioHtml}
            `;
        }
        
        // ============================================================
        // GENERAR TICKET EN TEXTO PLANO (con formato bonito)
        // ============================================================
        function generarTicketTexto() {
            const ancho = 48;
            let t = '';
            
            t += '_'.repeat(ancho) + '\n';
            t += centerText('COTILPEZ S.A.S.', ancho) + '\n';
            t += centerText('NIT: 900.300.702-0', ancho) + '\n';
            t += `Calle 43 8b 22 Pereira Risaralda \n`;
            t += `Comercializadora de Tilapias y Pescados \n`;
            t += '_'.repeat(ancho) + '\n';
            t += `Factura: ${datosVenta.factura}\n`;
            t += `Cliente: ${datosVenta.cliente}\n`;
            t += `Fecha: ${datosVenta.fecha}\n`;
            
            // ========== AGREGAR COMENTARIO SI EXISTE ==========
            if (datosVenta.comentario && datosVenta.comentario.trim() !== '') {
                t += '_'.repeat(ancho) + '\n';
                t += centerText('COMENTARIO', ancho) + '\n';
                // Dividir comentario largo en líneas
                const lineas = wrapText(datosVenta.comentario, ancho - 4);
                for (const linea of lineas) {
                    t += `  ${linea}\n`;
                }
            }
            // ==================================================
            
            t += '_'.repeat(ancho) + '\n';
            t += padRight('Cant', 6) + padRight('Producto', 28) + padRight('Total', 14) + '\n';
            t += '_'.repeat(ancho) + '\n';
            
            for (const p of datosVenta.productos) {
                const cantidad = p.cantidad.toString();
                const nombre = truncateText(p.nombre, 28);
                const subtotal = formatMoneda(p.subtotal);
                t += padRight(cantidad, 6) + padRight(nombre, 28) + padRight(subtotal, 14) + '\n';
            }
            
            t += '_'.repeat(ancho) + '\n';
            t += padRight('TOTAL', 34) + padRight('$' + totalNumerico.toLocaleString(), 14) + '\n';
            t += '_'.repeat(ancho) + '\n';
            t += centerText('¡GRACIAS POR SU COMPRA!', ancho) + '\n';
            t += centerText('Vuelva pronto', ancho) + '\n';
            t += '_'.repeat(ancho) + '\n';
            
            return t;
        }
        
        // ============================================================
        // FUNCIÓN PARA DIVIDIR TEXTO LARGO EN MÚLTIPLES LÍNEAS
        // ============================================================
        function wrapText(texto, maxLen) {
            if (!texto) return [];
            const palabras = texto.split(' ');
            const lineas = [];
            let lineaActual = '';
            
            for (const palabra of palabras) {
                if ((lineaActual + ' ' + palabra).length <= maxLen) {
                    lineaActual += (lineaActual ? ' ' : '') + palabra;
                } else {
                    if (lineaActual) lineas.push(lineaActual);
                    lineaActual = palabra;
                }
            }
            if (lineaActual) lineas.push(lineaActual);
            
            return lineas;
        }
        
        // ============================================================
        // FUNCIONES AUXILIARES PARA FORMATEAR TEXTO
        // ============================================================
        function centerText(texto, ancho) {
            if (texto.length >= ancho) return texto.substring(0, ancho);
            const espacios = ancho - texto.length;
            const izquierda = Math.floor(espacios / 2);
            return ' '.repeat(izquierda) + texto + ' '.repeat(espacios - izquierda);
        }
        
        function padRight(texto, ancho) {
            const str = String(texto);
            if (str.length >= ancho) return str.substring(0, ancho);
            return str + ' '.repeat(ancho - str.length);
        }
        
        function padLeft(texto, ancho) {
            const str = String(texto);
            if (str.length >= ancho) return str.substring(0, ancho);
            return ' '.repeat(ancho - str.length) + str;
        }
        
        function truncateText(texto, maxLen) {
            const str = String(texto || '');
            if (str.length <= maxLen) return str;
            return str.substring(0, maxLen - 3) + '...';
        }
        
        function formatMoneda(valor) {
            const num = parseFloat(valor);
            if (isNaN(num)) return '0';
            return num.toLocaleString();
        }
        
        function escapeHtml(texto) {
            if (!texto) return '';
            return texto.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ============================================================
        // FUNCIÓN PRINCIPAL: IMPRIMIR CON RAWBT
        // ============================================================
        function imprimirConRawBT() {
            const statusDiv = document.getElementById('status');
            
            if (!ticketTexto || datosVenta.factura === 'S/N') {
                statusDiv.innerHTML = '❌ Error: No hay ticket para imprimir';
                statusDiv.className = 'status status-error';
                return;
            }
            
            // PASO 1: Codificar el ticket para que sea seguro en una URL
            const ticketCodificado = encodeURIComponent(ticketTexto);
            
            // PASO 2: Construir el Intent URI para RawBT
            const intentUri = `intent:${ticketCodificado}#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;`;
            
            statusDiv.innerHTML = '📤 Abriendo RawBT...';
            statusDiv.className = 'status status-info';
            
            // PASO 3: Redirigir el navegador a ese enlace especial
            window.location.href = intentUri;
            
            // PASO 4: Actualizar estado y preparar cierre
            setTimeout(() => {
                statusDiv.innerHTML = '✅ Ticket enviado a RawBT. La ventana se cerrará en 3 segundos.';
                statusDiv.className = 'status status-success';
            }, 1500);
            
            // Cerrar la ventana después de 4 segundos
            setTimeout(() => {
                window.close();
            }, 4000);
        }
        
        // ============================================================
        // COPIAR TICKET AL PORTAPAPELES (FALLBACK MANUAL)
        // ============================================================
        function copiarTicket() {
            if (!ticketTexto) {
                alert('No hay ticket para copiar');
                return;
            }
            
            let ticketLimpio = ticketTexto;
            
            navigator.clipboard.writeText(ticketLimpio).then(() => {
                const statusDiv = document.getElementById('status');
                statusDiv.innerHTML = '✅ Ticket copiado al portapapeles';
                statusDiv.className = 'status status-success';
                
                setTimeout(() => {
                    statusDiv.innerHTML = '⚪ Listo para imprimir';
                    statusDiv.className = 'status status-info';
                }, 2000);
            }).catch(() => {
                const statusDiv = document.getElementById('status');
                statusDiv.innerHTML = '❌ Error al copiar. Copia manualmente.';
                statusDiv.className = 'status status-error';
            });
        }
        
        // ============================================================
        // CERRAR VENTANA
        // ============================================================
        function cerrarVentana() {
            window.close();
        }
        
        // ============================================================
        // INICIALIZAR TODO CUANDO CARGA LA PÁGINA
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const hayDatos = leerDatosURL();
            
            if (!hayDatos) {
                document.getElementById('ticketPreview').innerHTML = '⚠️ No hay datos de factura para imprimir';
                document.getElementById('status').innerHTML = '⚠️ Esperando datos del POS...';
                document.getElementById('status').className = 'status status-warning';
            }
            
            // Asignar eventos a los botones
            document.getElementById('btnImprimir').onclick = imprimirConRawBT;
            document.getElementById('btnCopiar').onclick = copiarTicket;
            document.getElementById('btnCerrar').onclick = cerrarVentana;
        });
    </script>
</body>
</html>
